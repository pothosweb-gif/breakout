<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Breakout</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: #1a1a1a;
    font-family: 'Arial', sans-serif;
  }
  h1 {
    color: #00ff00;
    margin-bottom: 20px;
    text-shadow: 0 0 10px #00ff00;
    font-size: 32px;
  }
  #gameContainer {
    position: relative;
    width: 800px;
    height: 600px;
    border: 4px solid #00ff00;
    background: #000;
    box-shadow: 0 0 30px #00ff00;
  }
  canvas {
    display: block;
    width: 100%;
    height: 100%;
    background: #000;
  }
  #info {
    color: #00ff00;
    margin-top: 20px;
    font-size: 16px;
    text-shadow: 0 0 5px #00ff00;
  }
  #gameOverScreen {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0, 0, 0, 0.95);
    padding: 40px;
    border: 3px solid #00ff00;
    text-align: center;
    display: none;
    z-index: 100;
  }
  #gameOverText {
    color: #00ff00;
    font-size: 48px;
    margin-bottom: 20px;
    text-shadow: 0 0 10px #00ff00;
  }
  #finalScore {
    color: #00ff00;
    font-size: 28px;
    margin-bottom: 30px;
  }
  #restartButton {
    color: #000;
    background: #00ff00;
    border: 2px solid #00ff00;
    padding: 12px 30px;
    font-size: 20px;
    cursor: pointer;
    font-weight: bold;
  }
  #restartButton:hover {
    background: #00dd00;
    border-color: #00dd00;
  }
</style>
</head>
<body>

<h1>BREAKOUT</h1>

<div id="gameContainer">
  <canvas id="gameCanvas" width="800" height="600"></canvas>
  <div id="gameOverScreen">
    <div id="gameOverText">CLEAR!</div>
    <div id="finalScore">Score: 0</div>
    <button id="restartButton">PLAY AGAIN</button>
  </div>
</div>

<div id="info">
  <span id="score">Score: 0</span> | 
  <span>← → Move | Space: Start/Continue</span>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// Game objects
const paddle = {
  x: canvas.width / 2 - 50,
  y: canvas.height - 30,
  width: 100,
  height: 20,
  dx: 6
};

const ball = {
  x: canvas.width / 2,
  y: canvas.height - 60,
  radius: 8,
  dx: 0,
  dy: 0,
  speed: 5,
  launched: false
};

// Blocks
const blockConfig = {
  rows: 4,
  cols: 8,
  width: 80,
  height: 20,
  padding: 10,
  offsetTop: 30,
  offsetLeft: 20
};

let blocks = [];
let score = 0;
let gameOver = false;
let gameWon = false;
const keys = {};

// Initialize blocks
function initBlocks() {
  blocks = [];
  for (let row = 0; row < blockConfig.rows; row++) {
    for (let col = 0; col < blockConfig.cols; col++) {
      const x = blockConfig.offsetLeft + col * (blockConfig.width + blockConfig.padding);
      const y = blockConfig.offsetTop + row * (blockConfig.height + blockConfig.padding);
      blocks.push({
        x: x,
        y: y,
        width: blockConfig.width,
        height: blockConfig.height,
        color: ['#ff0000', '#ffaa00', '#ffff00', '#00ff00'][row],
        hit: false
      });
    }
  }
}

// Input handling
window.addEventListener('keydown', (e) => {
  keys[e.key] = true;
  if (e.key === ' ') {
    e.preventDefault();
    if (!ball.launched && !gameOver && !gameWon) {
      ball.dx = (Math.random() > 0.5 ? 1 : -1) * ball.speed * 0.7;
      ball.dy = -ball.speed;
      ball.launched = true;
    }
  }
});
window.addEventListener('keyup', (e) => {
  keys[e.key] = false;
});

function update() {
  if (gameOver || gameWon) return;

  // Paddle movement
  if (keys['ArrowLeft'] && paddle.x > 0) {
    paddle.x -= paddle.dx;
  }
  if (keys['ArrowRight'] && paddle.x < canvas.width - paddle.width) {
    paddle.x += paddle.dx;
  }

  // Ball physics
  if (ball.launched) {
    ball.x += ball.dx;
    ball.y += ball.dy;

    // Wall collision
    if (ball.x - ball.radius < 0 || ball.x + ball.radius > canvas.width) {
      ball.dx *= -1;
      ball.x = Math.max(ball.radius, Math.min(canvas.width - ball.radius, ball.x));
    }
    if (ball.y - ball.radius < 0) {
      ball.dy *= -1;
      ball.y = ball.radius;
    }

    // Bottom collision (lose)
    if (ball.y - ball.radius > canvas.height) {
      gameOver = true;
      document.getElementById('gameOverText').textContent = 'GAME OVER';
      document.getElementById('gameOverScreen').style.display = 'block';
      document.getElementById('finalScore').textContent = 'Score: ' + score;
    }

    // Paddle collision
    if (ball.y + ball.radius > paddle.y &&
        ball.y - ball.radius < paddle.y + paddle.height &&
        ball.x > paddle.x &&
        ball.x < paddle.x + paddle.width) {
      ball.dy = -ball.speed;
      const hitPos = (ball.x - paddle.x) / paddle.width;
      ball.dx = (hitPos - 0.5) * ball.speed * 2;
    }

    // Block collision
    for (let block of blocks) {
      if (!block.hit &&
          ball.x > block.x &&
          ball.x < block.x + block.width &&
          ball.y > block.y &&
          ball.y < block.y + block.height) {
        block.hit = true;
        ball.dy *= -1;
        score += 10;
        document.getElementById('score').textContent = 'Score: ' + score;
      }
    }

    // Check win condition
    if (blocks.every(b => b.hit)) {
      gameWon = true;
      document.getElementById('gameOverText').textContent = 'CLEAR!';
      document.getElementById('gameOverScreen').style.display = 'block';
      document.getElementById('finalScore').textContent = 'Score: ' + score;
    }
  } else {
    // Ball follows paddle before launch
    ball.x = paddle.x + paddle.width / 2;
    ball.y = paddle.y - ball.radius - 10;
  }
}

function draw() {
  // Clear
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Paddle
  ctx.fillStyle = '#00ff00';
  ctx.fillRect(paddle.x, paddle.y, paddle.width, paddle.height);

  // Ball
  ctx.fillStyle = '#ffff00';
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
  ctx.fill();

  // Blocks
  for (let block of blocks) {
    if (!block.hit) {
      ctx.fillStyle = block.color;
      ctx.fillRect(block.x, block.y, block.width, block.height);
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 1;
      ctx.strokeRect(block.x, block.y, block.width, block.height);
    }
  }
}

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

// Restart
document.getElementById('restartButton').addEventListener('click', () => {
  paddle.x = canvas.width / 2 - 50;
  ball.x = canvas.width / 2;
  ball.y = canvas.height - 60;
  ball.dx = 0;
  ball.dy = 0;
  ball.launched = false;
  score = 0;
  gameOver = false;
  gameWon = false;
  document.getElementById('gameOverScreen').style.display = 'none';
  document.getElementById('score').textContent = 'Score: 0';
  initBlocks();
});

// Initialize
initBlocks();
gameLoop();
</script>

</body>
</html>
