<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Breakout</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: #1a1a1a;
    font-family: 'Arial', sans-serif;
  }
  h1 {
    color: #00ff00;
    margin-bottom: 20px;
    text-shadow: 0 0 10px #00ff00;
    font-size: 32px;
  }
  #gameContainer {
    position: relative;
    width: 800px;
    height: 600px;
    border: 4px solid #00ff00;
    background: #000;
    box-shadow: 0 0 30px #00ff00;
  }
  canvas {
    display: block;
    width: 100%;
    height: 100%;
    background: #000;
  }
  #info {
    color: #00ff00;
    margin-top: 20px;
    font-size: 16px;
    text-shadow: 0 0 5px #00ff00;
  }
  #gameOverScreen {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0, 0, 0, 0.95);
    padding: 40px;
    border: 3px solid #00ff00;
    text-align: center;
    display: none;
    z-index: 100;
  }
  #gameOverText {
    color: #00ff00;
    font-size: 48px;
    margin-bottom: 20px;
    text-shadow: 0 0 10px #00ff00;
  }
  #finalScore {
    color: #00ff00;
    font-size: 28px;
    margin-bottom: 30px;
  }
  #restartButton {
    color: #000;
    background: #00ff00;
    border: 2px solid #00ff00;
    padding: 12px 30px;
    font-size: 20px;
    cursor: pointer;
    font-weight: bold;
  }
  #restartButton:hover {
    background: #00dd00;
    border-color: #00dd00;
  }
</style>
</head>
<body>

<h1>BREAKOUT</h1>

<div id="gameContainer">
  <canvas id="gameCanvas" width="800" height="600"></canvas>
  <div id="gameOverScreen">
    <div id="gameOverText">CLEAR!</div>
    <div id="finalScore">Score: 0</div>
    <button id="restartButton">PLAY AGAIN</button>
  </div>
</div>

<div id="info">
  <span id="score">Score: 0</span> | 
  <span>← → Move | Space: Start/Continue</span>
</div>
